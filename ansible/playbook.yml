---
- name: Deploy Cloud-1 (Inception) on remote server
  hosts: all
  become: true

  roles:
    - common      # system packages, create directories
    - docker      # install Docker CE + compose plugin
    - firewall    # UFW: allow 22/80/443 only
    - app         # copy source files, template .env
    - database    # start MariaDB container
    - wordpress   # build and start WordPress (php-fpm) container
    - phpmyadmin  # start phpMyAdmin container
    - nginx       # build and start nginx reverse proxy container
