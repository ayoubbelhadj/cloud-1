---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH (port 22)
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Allow HTTP (port 80)
  community.general.ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: Allow HTTPS (port 443)
  community.general.ufw:
    rule: allow
    port: '443'
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled
